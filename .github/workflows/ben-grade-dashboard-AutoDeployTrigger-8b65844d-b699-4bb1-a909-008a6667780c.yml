name: Trigger auto deployment for ben-grade-dashboard

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ben-grade-dashboard-AutoDeployTrigger-8b65844d-b699-4bb1-a909-008a6667780c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.BENGRADEDASHBOARD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BENGRADEDASHBOARD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BENGRADEDASHBOARD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: deangraderegistry.azurecr.io
          registryUsername: ${{ secrets.BENGRADEDASHBOARD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BENGRADEDASHBOARD_REGISTRY_PASSWORD }}
          containerAppName: ben-grade-dashboard
          resourceGroup: DeanFamily-RG
          imageToBuild: deangraderegistry.azurecr.io/ben-grade-dashboard:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


