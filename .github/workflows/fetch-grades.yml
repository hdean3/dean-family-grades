name: Fetch Grades from Gmail

on:
  schedule:
    - cron: '0 * * * *'   # Every hour, same as Logic App
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit grades.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 studentvue

      - name: Fetch grades
        env:
          PARENTVUE_USERNAME: ${{ secrets.PARENTVUE_USERNAME }}
          PARENTVUE_PASSWORD: ${{ secrets.PARENTVUE_PASSWORD }}
          PARENTVUE_DISTRICT: https://portal.lcps.org
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/fetch_grades.py

      - name: Commit updated grades.json
        run: |
          git config user.name "grades-bot"
          git config user.email "grades-bot@users.noreply.github.com"
          git add data/grades.json
          if git diff --staged --quiet; then
            echo "No grade changes detected. Skipping commit."
          else
            git commit -m "Update grades from ParentVUE email"
            git push
          fi
