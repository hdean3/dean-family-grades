name: Deploy Grade Dashboard
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push
        run: |
          az acr build --registry deangraderegistry --image ben-grade-dashboard:${{ github.sha }} .

      - name: Deploy
        run: |
          az containerapp update \
            --name ben-grade-dashboard \
            --resource-group DeanFamily-RG \
            --container-name ben-grade-dashboard \
            --image deangraderegistry.azurecr.io/ben-grade-dashboard:${{ github.sha }} \
            --set-env-vars \
              STUDENT_NAME="${{ vars.STUDENT_NAME }}" \
              RATE_APLUS="${{ vars.RATE_APLUS }}" \
              RATE_A="${{ vars.RATE_A }}" \
              RATE_AMINUS="${{ vars.RATE_AMINUS }}" \
              RATE_BPLUS="${{ vars.RATE_BPLUS }}" \
              RATE_B="${{ vars.RATE_B }}" \
              RATE_BMINUS="${{ vars.RATE_BMINUS }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      - name: Deploy Logic App Configuration
        run: |
          az resource update \
            --ids /subscriptions/0193ed34-6e20-404d-9d2d-ab804a1a8129/resourceGroups/DeanFamily-RG/providers/Microsoft.Logic/workflows/BenGrade-Automation \
            --set properties.definition=@infrastructure/logic-app.json
