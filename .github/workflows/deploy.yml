name: Deploy Grade Dashboard
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Atomic App Update
        run: |
          az containerapp update \
            --name ben-grade-dashboard \
            --resource-group DeanFamily-RG \
            --yaml .azure/containerapp.yaml
