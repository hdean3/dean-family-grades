name: Deploy Grade Dashboard
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ben-grade-dashboard \
            --resource-group DeanFamily-RG \
            --container-name ben-tracker-final \
            --image deangraderegistry.azurecr.io/ben-grade-dashboard:7c94efffbc34e2da177983e91e53aea2a1e3b6c6
