name: Deploy Grade Dashboard
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push
        run: |
          az acr build --registry deangraderegistry --image ben-grade-dashboard:${{ github.sha }} .

      - name: Deploy
        run: |
          az containerapp update \
            --name ben-grade-dashboard \
            --resource-group DeanFamily-RG \
            --container-name ben-grade-dashboard \
            --image deangraderegistry.azurecr.io/ben-grade-dashboard:${{ github.sha }} \
            --set-env-vars \
              STUDENT_NAME="${{ vars.STUDENT_NAME }}" \
              RATE_APLUS="${{ vars.RATE_APLUS }}" \
              RATE_A="${{ vars.RATE_A }}" \
              RATE_AMINUS="${{ vars.RATE_AMINUS }}" \
              RATE_BPLUS="${{ vars.RATE_BPLUS }}" \
              RATE_B="${{ vars.RATE_B }}" \
              RATE_BMINUS="${{ vars.RATE_BMINUS }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      - name: Deploy Logic App Configuration
        run: |
          # 1. Dynamically find the Logic App ID to avoid "Not Found" errors
          LOGIC_ID=$(az logic workflow show --name BenGrade-Automation --resource-group DeanFamily-RG --query id -o tsv)
          
          # 2. Extract the definition and deploy
          LOGIC_DEF=$(jq -r '.definition' infrastructure/logic-app.json)
          az resource update \
            --ids "$LOGIC_ID" \
            --set properties.definition="$LOGIC_DEF"
